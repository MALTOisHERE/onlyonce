services:
  blink:
    build: .
    container_name: blink
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=blink.malto.icu
      - SECRET_KEY=${SECRET_KEY}
      - CIPHER_KEY=${CIPHER_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - "EMAIL_FROM=Blink <noreply@malto.icu>"
      - STATS_FILE=/data/stats.json
      - LICENSES_FILE=/data/licenses.json
      - LS_STORE_ID=${LS_STORE_ID}
      - LS_PRODUCT_ID=${LS_PRODUCT_ID}
      - PRO_CHECKOUT_URL=${PRO_CHECKOUT_URL}
      - PRO_USAGE_RATE_LIMIT=${PRO_USAGE_RATE_LIMIT}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - /var/www/blink/data:/data
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
