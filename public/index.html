<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blink</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <img src="/logo.png" alt="Blink" class="logo">
        <span class="logo-text">Blink</span>
      </div>
      <p class="tagline">Share secrets that disappear. Once seen, forever gone.</p>
    </header>

    <main class="main">
      <div class="card">
        <div class="tabs">
          <button class="tab active" data-tab="enter">Enter Secret</button>
          <button class="tab" data-tab="generate">Generate Password</button>
        </div>

        <!-- Enter Tab -->
        <div class="tab-content active" id="tab-enter">
          <div class="field">
            <label>Your Secret</label>
            <textarea id="secret-input" rows="4" placeholder="Paste your password, API key, or any sensitive text…" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
          </div>
        </div>

        <!-- Generate Tab -->
        <div class="tab-content" id="tab-generate">
          <div class="field">
            <label>Generated Password</label>
            <div class="gen-preview-wrap">
              <input type="text" id="gen-preview" readonly placeholder="Click Generate">
              <button class="icon-btn" id="gen-copy" title="Copy password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="icon-btn" id="gen-refresh" title="Regenerate">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              </button>
            </div>
          </div>

          <div class="slider-field">
            <label>Length <span id="length-val">16</span></label>
            <input type="range" id="length-slider" min="8" max="64" value="16">
          </div>

          <div class="checkboxes">
            <label class="check-label">
              <input type="checkbox" id="opt-upper" checked>
              <span class="checkmark"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></span>
              <span>Uppercase A–Z</span>
            </label>
            <label class="check-label">
              <input type="checkbox" id="opt-lower" checked>
              <span class="checkmark"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></span>
              <span>Lowercase a–z</span>
            </label>
            <label class="check-label">
              <input type="checkbox" id="opt-numbers" checked>
              <span class="checkmark"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></span>
              <span>Numbers 0–9</span>
            </label>
            <label class="check-label">
              <input type="checkbox" id="opt-symbols" checked>
              <span class="checkmark"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></span>
              <span>Symbols !@#$…</span>
            </label>
          </div>

          <div class="strength-wrap">
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <p class="strength-label">Strength: <span id="strength-text"></span></p>
          </div>

          <button class="btn-secondary" id="btn-generate">Generate</button>
        </div>

        <div class="option-row">
          <label class="check-label check-full">
            <input type="checkbox" id="opt-expires">
            <span class="checkmark"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span>Expire in 10 minutes</span>
          </label>
        </div>

        <div id="error-banner" class="error-banner"></div>

        <div class="divider"></div>

        <button class="btn-primary" id="btn-create">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Encrypt &amp; Create Link
        </button>

        <div class="result hidden" id="result">
          <div style="height:1px;background:var(--border);margin:20px 0;"></div>
          <div class="result-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Secure link ready
          </div>
          <div class="link-box">
            <input type="text" id="link-output" readonly autocomplete="off">
            <button class="copy-link-btn" id="link-copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              <span>Copy</span>
            </button>
          </div>
          <div class="warn-box">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span><span id="warn-expiry" style="display:none">Expires in <strong id="countdown" style="font-family:'JetBrains Mono',monospace;margin:0 2px;">10:00</strong> &nbsp;·&nbsp; </span>View once only &nbsp;·&nbsp; Never stored in plaintext</span>
          </div>
        </div>
      </div>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <span>E2E Encrypted</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <span>View Once</span>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <span>Timed Expiry</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      Blink &nbsp; &middot; &nbsp; Secrets never stored in plaintext
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
